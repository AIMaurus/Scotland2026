<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Schottland 2026</title>
<style>
  :root {
    --bg:#0c1a0f;--bg2:#111f14;--bg3:#162319;--card:#182118;--card2:#1e2c1e;
    --border:#253325;--border2:#2e422e;--gold:#c9a45a;--gold2:#e8c07a;
    --green:#5a9e6a;--green2:#7abf8a;--slate:#8aabb0;--amber:#e8a84a;
    --red:#d4735a;--purple:#a090d4;--teal:#5abfb0;--text:#e0d4bc;--text2:#a0b4a0;--text3:#6a886a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:30px;}

  /* PASSWORD */
  #pw{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#0c2214,#0e1e12);display:flex;align-items:center;justify-content:center;flex-direction:column;padding:32px;}
  #pw .flag{font-size:3.5rem;margin-bottom:16px;}
  #pw h2{color:#c9a45a;font-size:1.4rem;font-weight:800;margin-bottom:6px;text-align:center;}
  #pw p{color:#a0b4a0;font-size:0.85rem;margin-bottom:28px;text-align:center;}
  #pw input{width:100%;max-width:280px;background:#182118;border:1px solid #2e422e;color:#e0d4bc;font-size:1.1rem;font-weight:600;padding:14px 18px;border-radius:14px;outline:none;text-align:center;letter-spacing:0.05em;margin-bottom:14px;}
  #pw input:focus{border-color:#c9a45a;}
  #pw input.shake{animation:shake 0.4s ease;border-color:#d4735a;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
  #pw button{width:100%;max-width:280px;background:linear-gradient(135deg,#2a5a34,#1a3a22);border:1px solid #2e422e;color:#e8c07a;font-size:1rem;font-weight:700;padding:14px;border-radius:14px;cursor:pointer;}
  #pw button:active{opacity:0.8;}
  #pw-err{color:#d4735a;font-size:0.8rem;margin-top:12px;min-height:18px;}

  /* HEADER */
  .header{background:linear-gradient(160deg,#0c2214,#142a18,#0e1e12);padding:18px 16px 14px;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:200;}
  .header-top{display:flex;align-items:center;justify-content:space-between;}
  .header h1{font-size:1.25rem;font-weight:800;color:var(--gold);letter-spacing:-0.01em;}
  .header-flag{font-size:1.6rem;}
  .header-sub{color:var(--text2);font-size:0.78rem;margin-top:3px;}
  .progress-bar{height:2px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:2px;transition:width 0.3s;}

  /* TABS */
  .tab-nav{display:flex;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border);scrollbar-width:none;position:sticky;top:72px;z-index:199;-webkit-overflow-scrolling:touch;}
  .tab-nav::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;padding:9px 13px 8px;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;text-align:center;min-width:56px;user-select:none;}
  .tab:active{opacity:0.7;}
  .tab.active{border-bottom-color:var(--gold);}
  .tab-date{font-size:0.82rem;font-weight:700;color:var(--text2);}
  .tab.active .tab-date{color:var(--gold);}
  .tab-label{font-size:0.6rem;color:var(--text3);margin-top:1px;white-space:nowrap;}
  .tab.active .tab-label{color:var(--gold2);opacity:0.7;}

  /* DAYS */
  .day{display:none;padding:14px 14px 20px;max-width:560px;margin:0 auto;}
  .day.active{display:block;}

  .day-header{background:linear-gradient(140deg,#182e1c,#0f2014);border:1px solid var(--border2);border-radius:16px;padding:16px;margin-bottom:14px;position:relative;overflow:hidden;}
  .day-header::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;background:radial-gradient(circle,rgba(201,164,90,0.08),transparent);}
  .day-header h2{font-size:1.15rem;font-weight:800;color:var(--gold);line-height:1.2;}
  .day-header-date{font-size:0.75rem;color:var(--text2);margin-top:3px;}
  .day-header-route{margin-top:8px;font-size:0.82rem;color:var(--text2);line-height:1.4;border-top:1px solid var(--border);padding-top:8px;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;}
  .card-title{display:flex;align-items:center;gap:7px;padding:11px 14px 10px;border-bottom:1px solid var(--border);font-size:0.72rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;}
  .ct-stops{color:var(--green2);}.ct-stay{color:var(--slate);}.ct-dinner{color:var(--amber);}
  .ct-note{color:var(--gold);}.ct-special{color:var(--purple);}.ct-bonus{color:var(--teal);}

  .stop{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);}
  .stop:last-child{border-bottom:none;}
  .stop-icon{font-size:1.15rem;flex-shrink:0;line-height:1;margin-top:1px;}
  .stop-body{flex:1;min-width:0;}
  .stop-name{font-size:0.93rem;font-weight:600;color:var(--text);}
  .stop-note{font-size:0.78rem;color:var(--text2);margin-top:2px;line-height:1.4;}
  .stop-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}

  .badge{display:inline-flex;align-items:center;gap:3px;font-size:0.7rem;font-weight:600;padding:3px 8px;border-radius:20px;text-decoration:none;border:1px solid transparent;white-space:nowrap;}
  .badge-map{background:rgba(90,158,106,0.12);color:var(--green2);border-color:rgba(90,158,106,0.25);}
  .badge-map:active{background:rgba(90,158,106,0.25);}
  .badge-time{background:rgba(232,168,74,0.12);color:var(--amber);border-color:rgba(232,168,74,0.25);}
  .badge-res{background:rgba(201,164,90,0.12);color:var(--gold2);border-color:rgba(201,164,90,0.25);}
  .badge-new{background:rgba(160,144,212,0.15);color:var(--purple);border-color:rgba(160,144,212,0.3);font-size:0.62rem;}

  .info-block{padding:12px 14px;}
  .info-name{font-size:0.95rem;font-weight:700;color:var(--text);}
  .info-addr{font-size:0.77rem;color:var(--text2);margin-top:2px;font-style:italic;}
  .info-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;align-items:center;}
  .phone-link{display:inline-flex;align-items:center;gap:4px;color:var(--green2);font-size:0.8rem;text-decoration:none;background:rgba(90,158,106,0.1);padding:4px 10px;border-radius:20px;border:1px solid rgba(90,158,106,0.2);}
  .phone-link:active{background:rgba(90,158,106,0.22);}
  .nights-badge{font-size:0.72rem;color:var(--text3);background:var(--bg3);padding:3px 8px;border-radius:10px;}
  .res-badge{font-size:0.7rem;font-weight:700;background:rgba(232,168,74,0.15);color:var(--amber);padding:3px 8px;border-radius:10px;border:1px solid rgba(232,168,74,0.3);}

  .note-item{padding:11px 14px;border-bottom:1px solid var(--border);font-size:0.82rem;line-height:1.55;color:var(--text);white-space:pre-wrap;}
  .note-item:last-child{border-bottom:none;}
  .note-item.type-warning{border-left:3px solid var(--red);color:#f0c8b8;}
  .note-item.type-info{border-left:3px solid var(--green);}
  .note-item.type-special{border-left:3px solid var(--purple);color:#d0c8f0;}
  .note-item.type-bonus{border-left:3px solid var(--teal);color:#c0eae4;}

  .card.special-card{background:#131120;border-color:#2e2a50;}
  .card.bonus-card{background:#0f1f1e;border-color:#1e3835;}

  .day-nav{display:flex;justify-content:space-between;padding:4px 0 16px;gap:10px;}
  .nav-btn{flex:1;background:var(--card2);border:1px solid var(--border2);color:var(--text2);font-size:0.82rem;font-weight:600;padding:10px 14px;border-radius:12px;cursor:pointer;text-align:center;transition:all 0.15s;}
  .nav-btn:active{background:var(--border2);}
  .nav-btn:disabled{opacity:0.3;cursor:default;}

  .ov-row{display:flex;align-items:stretch;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;margin-bottom:7px;}
  .ov-row:active{opacity:0.75;}
  .ov-date{background:var(--bg3);min-width:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 8px;border-right:1px solid var(--border);}
  .ov-d{font-size:0.9rem;font-weight:800;color:var(--gold);}
  .ov-m{font-size:0.65rem;color:var(--text3);}
  .ov-content{flex:1;padding:10px 12px;}
  .ov-title{font-size:0.88rem;font-weight:700;color:var(--text);}
  .ov-sub{font-size:0.74rem;color:var(--text2);margin-top:2px;}
  .ov-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
  .ov-tag{font-size:0.65rem;padding:2px 6px;border-radius:8px;font-weight:600;}
  .tag-res{background:rgba(232,168,74,0.15);color:var(--amber);}
  .tag-early{background:rgba(212,115,90,0.15);color:var(--red);}
  .tag-cash{background:rgba(160,144,212,0.15);color:var(--purple);}
  .tag-new{background:rgba(90,191,176,0.15);color:var(--teal);}
  .tag-dau{background:rgba(160,144,212,0.15);color:var(--purple);}
</style>
</head>

<div id="pw">
  <div class="flag">&#x1F3F4;</div>
  <h2>Schottland 2026</h2>
  <p>Bitte Passwort eingeben</p>
  <input id="pw-in" type="password" placeholder="Passwort" autocomplete="off" onkeydown="if(event.key==='Enter')chk()">
  <button onclick="chk()">Weiter &#x2192;</button>
  <div id="pw-err"></div>
</div>
<script>
(function(){
  if(localStorage.getItem('sc26')==='1'){document.getElementById('pw').style.display='none';}
  window.chk=function(){
    var v=document.getElementById('pw-in').value.trim().toLowerCase();
    if(v==='easygoing'){localStorage.setItem('sc26','1');document.getElementById('pw').style.display='none';}
    else{var i=document.getElementById('pw-in');i.classList.remove('shake');void i.offsetWidth;i.classList.add('shake');document.getElementById('pw-err').textContent="Falsches Passwort – versuch's nochmal!";i.value='';}
  };
})();
</script>

function renderDay(d){
  var stops=d.stops.map(function(s){
    return '<div class="stop"><div class="stop-icon">'+s.icon+'</div><div class="stop-body"><div class="stop-name">'+s.name+(s.isNew?' <span class="badge badge-new">&#x2736; NEU</span>':'')+'</div>'+(s.note?'<div class="stop-note">'+s.note+'</div>':'')+'<div class="stop-badges">'+(s.time?'<span class="badge badge-time">&#x23F0; '+s.time+'</span>':'')+(s.map?'<a href="'+s.map+'" target="_blank" class="badge badge-map">&#x1F4CD; Maps</a>':'')+'</div></div></div>';
  }).join('');
  var stay='';
  if(d.stay){stay='<div class="card"><div class="card-title ct-stay">&#x1F6CF; Unterkunft</div><div class="info-block"><div class="info-name">'+d.stay.name+'</div>'+(d.stay.addr?'<div class="info-addr">'+d.stay.addr+'</div>':'')+(d.stay.host?'<div class="info-addr">Kontakt: '+d.stay.host+'</div>':'')+'<div class="info-meta">'+(d.stay.map?'<a href="'+d.stay.map+'" target="_blank" class="badge badge-map">&#x1F4CD; Maps</a>':'')+(d.stay.phone?'<a href="tel:'+d.stay.phone+'" class="phone-link">&#x1F4DE; '+d.stay.phone+'</a>':'')+(d.stay.nights?'<span class="nights-badge">&#x1F4C5; '+d.stay.nights+'</span>':'')+'</div></div></div>';}
  var din='';
  if(d.dinner){din='<div class="card"><div class="card-title ct-dinner">&#x1F37D; Dinner</div><div class="info-block"><div class="info-name">'+d.dinner.name+'</div>'+(d.dinner.detail?'<div class="info-addr">'+d.dinner.detail+'</div>':'')+(d.dinner.note?'<div class="info-addr">'+d.dinner.note+'</div>':'')+'<div class="info-meta">'+(d.dinner.time?'<span class="badge badge-time">&#x23F0; '+d.dinner.time+'</span>':'')+(d.dinner.reserved?'<span class="res-badge">&#x2705; Reserviert</span>':'')+(d.dinner.map?'<a href="'+d.dinner.map+'" target="_blank" class="badge badge-map">&#x1F4CD; Maps</a>':'')+(d.dinner.phone?'<a href="tel:'+d.dinner.phone+'" class="phone-link">&#x1F4DE; '+d.dinner.phone+'</a>':'')+'</div></div></div>';}
  var spec='';
  if(d.special){spec='<div class="card special-card"><div class="card-title ct-special">'+d.special.title+'</div><div class="note-item type-special">'+d.special.text+'</div></div>';}
  var bon='';
  if(d.bonus){var ex=d.bonus.mapGlenelg?'<div style="padding:0 14px 12px;display:flex;gap:8px;flex-wrap:wrap;"><a href="'+d.bonus.mapGlenelg+'" target="_blank" class="badge badge-map">&#x1F4CD; Glenelg</a><a href="'+d.bonus.mapFerry+'" target="_blank" class="badge badge-map">&#x1F4CD; Kylerhea F&auml;hre</a></div>':'';bon='<div class="card bonus-card"><div class="card-title ct-bonus">&#x1F4CE; '+d.bonus.title+'</div><div class="note-item type-bonus">'+d.bonus.text+'</div>'+ex+'</div>';}
  var notes='';
  if(d.notes&&d.notes.length){notes='<div class="card"><div class="card-title ct-note">&#x1F4A1; Hinweise</div>'+d.notes.map(function(n){return'<div class="note-item type-'+n.type+'">'+n.text+'</div>';}).join('')+'</div>';}
  var prev=d.id>0?'<button class="nav-btn" onclick="goDay('+(d.id-1)+')">&#x2190; '+days[d.id-1].short+'</button>':'<button class="nav-btn" disabled>&#x2190;</button>';
  var next=d.id<days.length-1?'<button class="nav-btn" onclick="goDay('+(d.id+1)+')">'+days[d.id+1].short+' &#x2192;</button>':'<button class="nav-btn" disabled>&#x2192;</button>';
  return '<div class="day" id="day-'+d.id+'"><div class="day-header"><h2>'+d.headline+'</h2><div class="day-header-date">'+d.dateStr+'</div><div class="day-header-route">'+d.route+'</div></div><div class="card"><div class="card-title ct-stops">&#x1F4CD; Stationen</div>'+stops+'</div>'+spec+bon+stay+din+notes+'<div class="day-nav">'+prev+next+'</div></div>';
}

function renderOverview(){
  var rows=days.map(function(d){
    var tags=[];
    if(d.dinner&&d.dinner.reserved)tags.push('<span class="ov-tag tag-res">&#x2705; Res.</span>');
    if(d.notes&&d.notes.some(function(n){return n.text&&(n.text.indexOf('06:30')>-1||n.text.indexOf('07:00')>-1||n.text.indexOf('FR&Uuml;H')>-1);}))tags.push('<span class="ov-tag tag-early">&#x23F0; Fr&uuml;h</span>');
    if(d.notes&&d.notes.some(function(n){return n.text&&n.text.indexOf('CASH')>-1;}))tags.push('<span class="ov-tag tag-cash">&#x1F4B0; Cash</span>');
    if(d.bonus)tags.push('<span class="ov-tag tag-new">&#x1F4CE; Bonus</span>');
    if(d.special)tags.push('<span class="ov-tag tag-dau">&#x2708;&#xFE0F; Tochter</span>');
    return '<div class="ov-row" onclick="goDay('+d.id+')"><div class="ov-date"><div class="ov-d">'+d.short+'</div><div class="ov-m">'+d.dayLabel+'</div></div><div class="ov-content"><div class="ov-title">'+d.headline+'</div><div class="ov-sub">'+d.route.split('&middot;')[0].trim()+'</div>'+(tags.length?'<div class="ov-tags">'+tags.join('')+'</div>':'')+'</div></div>';
  }).join('');
  return '<div class="day active" id="day-overview"><div class="card"><div class="card-title ct-note">&#x1F4CB; Reisetibersicht &#x2013; 11 Tage</div><div style="padding:12px 14px;">'+rows+'</div></div></div>';
}

var tabData=[{id:'overview',label:'&#x25C9; Alle',sub:'&Uuml;bersicht'}].concat(days.map(function(d){return{id:'day-'+d.id,label:d.short,sub:d.dayLabel};}));
document.getElementById('tabNav').innerHTML=tabData.map(function(t,i){return'<div class="tab'+(i===0?' active':'')+'" id="tab-'+t.id+'" onclick="goTab(\''+t.id+'\')"><div class="tab-date">'+t.label+'</div><div class="tab-label">'+t.sub+'</div></div>';}).join('');
document.getElementById('root').innerHTML=renderOverview()+days.map(renderDay).join('');

var current=0;
function hideAll(){document.querySelectorAll('.day').forEach(function(el){el.classList.remove('active');});document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('active');});}
function goTab(id){hideAll();var cid=id==='overview'?'day-overview':id;document.getElementById(cid).classList.add('active');document.getElementById('tab-'+id).classList.add('active');document.getElementById('tab-'+id).scrollIntoView({inline:'center',behavior:'smooth'});if(id!=='overview'){current=parseInt(id.replace('day-',''));updateProgress();}window.scrollTo({top:0,behavior:'smooth'});}
function goDay(idx){hideAll();document.getElementById('day-'+idx).classList.add('active');document.getElementById('tab-day-'+idx).classList.add('active');document.getElementById('tab-day-'+idx).scrollIntoView({inline:'center',behavior:'smooth'});current=idx;updateProgress();window.scrollTo({top:0,behavior:'smooth'});}
function updateProgress(){document.getElementById('prog').style.width=((current/(days.length-1))*100)+'%';}
</script>
