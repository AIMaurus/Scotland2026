<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Schottland 2026</title>
<style>
:root{--bg:#0c1a0f;--bg2:#111f14;--bg3:#162319;--card:#182118;--card2:#1e2c1e;--border:#253325;--border2:#2e422e;--gold:#c9a45a;--gold2:#e8c07a;--green:#5a9e6a;--green2:#7abf8a;--slate:#8aabb0;--amber:#e8a84a;--red:#d4735a;--purple:#a090d4;--teal:#5abfb0;--text:#e0d4bc;--text2:#a0b4a0;--text3:#6a886a;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:30px;}
#pw{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#0c2214,#0e1e12);display:flex;align-items:center;justify-content:center;flex-direction:column;padding:32px;}
.pw-flag{font-size:3.5rem;margin-bottom:16px;}
#pw h2{color:#c9a45a;font-size:1.4rem;font-weight:800;margin-bottom:6px;text-align:center;}
#pw p{color:#a0b4a0;font-size:0.85rem;margin-bottom:28px;text-align:center;}
#pw-in{width:100%;max-width:280px;background:#182118;border:1px solid #2e422e;color:#e0d4bc;font-size:1.1rem;font-weight:600;padding:14px 18px;border-radius:14px;outline:none;text-align:center;letter-spacing:0.05em;margin-bottom:14px;}
#pw-in:focus{border-color:#c9a45a;}
#pw-in.shake{animation:shake 0.4s ease;border-color:#d4735a;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
#pw-btn{width:100%;max-width:280px;background:linear-gradient(135deg,#2a5a34,#1a3a22);border:1px solid #2e422e;color:#e8c07a;font-size:1rem;font-weight:700;padding:14px;border-radius:14px;cursor:pointer;}
#pw-btn:active{opacity:.8;}
#pw-err{color:#d4735a;font-size:.8rem;margin-top:12px;min-height:18px;}
.header{background:linear-gradient(160deg,#0c2214,#142a18,#0e1e12);padding:18px 16px 14px;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:200;}
.header-top{display:flex;align-items:center;justify-content:space-between;}
.header h1{font-size:1.25rem;font-weight:800;color:var(--gold);}
.header-flag{font-size:1.6rem;}
.header-sub{color:var(--text2);font-size:.78rem;margin-top:3px;}
.progress-bar{height:2px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:2px;transition:width .3s;}
.tab-nav{display:flex;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border);scrollbar-width:none;position:sticky;top:72px;z-index:199;-webkit-overflow-scrolling:touch;}
.tab-nav::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;padding:9px 13px 8px;cursor:pointer;border-bottom:2px solid transparent;text-align:center;min-width:56px;user-select:none;}
.tab.active{border-bottom-color:var(--gold);}
.tab-date{font-size:.82rem;font-weight:700;color:var(--text2);}
.tab.active .tab-date{color:var(--gold);}
.tab-label{font-size:.6rem;color:var(--text3);margin-top:1px;white-space:nowrap;}
.tab.active .tab-label{color:var(--gold2);opacity:.7;}
.day{display:none;padding:14px 14px 20px;max-width:960px;margin:0 auto;}
.day.active{display:block;}
.day-header{background:linear-gradient(140deg,#182e1c,#0f2014);border:1px solid var(--border2);border-radius:16px;padding:16px;margin-bottom:12px;}
.day-header h2{font-size:1.15rem;font-weight:800;color:var(--gold);line-height:1.2;}
.day-header-date{font-size:.75rem;color:var(--text2);margin-top:3px;}
.day-header-route{margin-top:8px;font-size:.82rem;color:var(--text2);line-height:1.4;border-top:1px solid var(--border);padding-top:8px;}
.day-body{display:flex;flex-direction:column;gap:12px;}
.day-map-wrap{width:100%;height:240px;border-radius:14px;overflow:hidden;border:1px solid var(--border2);background:#111;flex-shrink:0;}
.day-map-col{display:flex;flex-direction:column;flex-shrink:0;}
.day-map-wrap>div{width:100%!important;height:100%!important;}
.day-content{flex:1;min-width:0;}
.map-info{background:rgba(10,20,12,.88);color:var(--gold);font-size:.72rem;font-weight:700;padding:5px 12px;text-align:center;border:1px solid var(--border2);border-top:none;border-radius:0 0 14px 14px;min-height:24px;letter-spacing:.02em;}
.map-info-sub{color:var(--text2);font-weight:400;font-size:.68rem;margin-left:6px;}
@media(min-width:700px){
  .day-body{flex-direction:row;align-items:flex-start;}
  .day-map-col{width:300px;position:sticky;top:132px;order:2;}
  .day-map-wrap{height:460px;}
  .day-content{order:1;}
}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;}
.card.special-card{background:#131120;border-color:#2e2a50;}
.card.note-card{background:#0f1a10;border-color:#1e3520;}
.sec-hd{display:flex;align-items:center;gap:7px;padding:11px 14px 10px;border-bottom:1px solid var(--border);font-size:.72rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;}
.sh-route{color:var(--green2);}
.sh-lunch{color:var(--amber);}
.sh-dinner{color:var(--gold);}
.sh-stay{color:var(--slate);}
.sh-note{color:var(--teal);}
.sh-special{color:var(--purple);}
.stop{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);}
.stop:last-child{border-bottom:none;}
.stop.is-opt{background:rgba(138,171,176,.04);}
.stop-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:800;flex-shrink:0;margin-top:1px;line-height:1;}
.stop-num.fix{background:var(--gold);color:#0c1a0f;}
.stop-num.opt{background:transparent;border:1.5px dashed var(--slate);color:var(--slate);font-size:.7rem;}
.stop-body{flex:1;min-width:0;}
.stop-name{font-size:.93rem;font-weight:600;color:var(--text);}
.stop.is-opt .stop-name{color:var(--slate);}
.stop-note{font-size:.78rem;color:var(--text2);margin-top:2px;line-height:1.4;}
.stop-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:.7rem;font-weight:600;padding:3px 8px;border-radius:20px;text-decoration:none;border:1px solid transparent;white-space:nowrap;}
.badge-map{background:rgba(90,158,106,.12);color:var(--green2);border-color:rgba(90,158,106,.25);}
.badge-map:active{background:rgba(90,158,106,.25);}
.badge-time{background:rgba(232,168,74,.12);color:var(--amber);border-color:rgba(232,168,74,.25);}
.badge-opt{background:rgba(138,171,176,.1);color:var(--slate);border-color:rgba(138,171,176,.25);font-size:.62rem;}
.info-block{padding:12px 14px;}
.info-name{font-size:.95rem;font-weight:700;color:var(--text);}
.info-addr{font-size:.77rem;color:var(--text2);margin-top:2px;font-style:italic;}
.info-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;align-items:center;}
.phone-link{display:inline-flex;align-items:center;gap:4px;color:var(--green2);font-size:.8rem;text-decoration:none;background:rgba(90,158,106,.1);padding:4px 10px;border-radius:20px;border:1px solid rgba(90,158,106,.2);}
.nights-badge{font-size:.72rem;color:var(--text3);background:var(--bg3);padding:3px 8px;border-radius:10px;}
.res-badge{font-size:.7rem;font-weight:700;background:rgba(232,168,74,.15);color:var(--amber);padding:3px 8px;border-radius:10px;border:1px solid rgba(232,168,74,.3);}
.note-item{padding:11px 14px;border-bottom:1px solid var(--border);font-size:.82rem;line-height:1.55;color:var(--text);white-space:pre-wrap;}
.note-item:last-child{border-bottom:none;}
.note-item.type-warning{border-left:3px solid var(--red);color:#f0c8b8;}
.note-item.type-info{border-left:3px solid var(--green);}
.note-item.type-special{border-left:3px solid var(--purple);color:#d0c8f0;}
.note-item.type-bonus{border-left:3px solid var(--teal);color:#c0eae4;}
.day-nav{display:flex;justify-content:space-between;padding:4px 0 16px;gap:10px;}
.nav-btn{flex:1;background:var(--card2);border:1px solid var(--border2);color:var(--text2);font-size:.82rem;font-weight:600;padding:10px 14px;border-radius:12px;cursor:pointer;text-align:center;}
.nav-btn:active{background:var(--border2);}
.nav-btn:disabled{opacity:.3;cursor:default;}
.ov-row{display:flex;align-items:stretch;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;margin-bottom:7px;}
.ov-row:active{opacity:.75;}
.ov-date{background:var(--bg3);min-width:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 8px;border-right:1px solid var(--border);}
.ov-d{font-size:.9rem;font-weight:800;color:var(--gold);}
.ov-m{font-size:.65rem;color:var(--text3);}
.ov-content{flex:1;padding:10px 12px;}
.ov-title{font-size:.88rem;font-weight:700;color:var(--text);}
.ov-sub{font-size:.74rem;color:var(--text2);margin-top:2px;}
.ov-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.ov-tag{font-size:.65rem;padding:2px 6px;border-radius:8px;font-weight:600;}
.tag-res{background:rgba(232,168,74,.15);color:var(--amber);}
.tag-early{background:rgba(212,115,90,.15);color:var(--red);}
.tag-cash{background:rgba(212,115,90,.15);color:var(--red);}
.tag-opt{background:rgba(138,171,176,.15);color:var(--slate);}
.tag-spec{background:rgba(160,144,212,.15);color:var(--purple);}
</style>

<div id="pw">
  <div class="pw-flag">&#x1F3F4;</div>
  <h2>Schottland 2026</h2>
  <p>Bitte Passwort eingeben</p>
  <input id="pw-in" type="password" placeholder="Passwort" autocomplete="off" onkeydown="if(event.key==='Enter')chk()">
  <button id="pw-btn" onclick="chk()">Weiter &#x2192;</button>
  <div id="pw-err"></div>
</div>
<script>
(function(){
  if(localStorage.getItem('sc26')==='1'){document.getElementById('pw').style.display='none';}
  window.chk=function(){
    var v=document.getElementById('pw-in').value.trim().toLowerCase();
    if(v==='easygoing'){localStorage.setItem('sc26','1');document.getElementById('pw').style.display='none';}
    else{var i=document.getElementById('pw-in');i.classList.remove('shake');void i.offsetWidth;i.classList.add('shake');document.getElementById('pw-err').textContent='Falsches Passwort!';i.value='';}
  };
})();
</script>

// ── GOOGLE MAPS ─────────────────────────────────────────────────────────
var gmaps={};
function initMap(id){
  var d=days.find(function(x){return x.id===id;});
  if(!d||!d.mc||!d.mc.length)return;
  var el=document.getElementById('map-'+id);
  if(!el||gmaps[id])return;
  if(!window.google||!window.google.maps){setTimeout(function(){initMap(id);},300);return;}
  var lats=d.mc.map(function(c){return c[0];});
  var lngs=d.mc.map(function(c){return c[1];});
  var cx={lat:(Math.min.apply(null,lats)+Math.max.apply(null,lats))/2,lng:(Math.min.apply(null,lngs)+Math.max.apply(null,lngs))/2};
  var map=new google.maps.Map(el,{center:cx,zoom:d.mz,mapTypeId:google.maps.MapTypeId.HYBRID,disableDefaultUI:true,zoomControl:true,gestureHandling:'cooperative'});
  var fixPts=d.mc.filter(function(c){return!c[3];});
  function addMarkers(){
    var fn=0;
    d.mc.forEach(function(c){
      var isO=c[3]===1;
      if(!isO)fn++;
      var lbl=isO?'?':String(fn);
      var fill=isO?'none':'%23c9a45a';
      var stroke=isO?'%238aabb0':'rgba(0,0,0,0.4)';
      var tc=isO?'%238aabb0':'%230c1a0f';
      var da=isO?'4 3':'none';
      var sw=isO?'2':'1.5';
      var svg='<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2228%22 height=%2228%22><circle cx=%2214%22 cy=%2214%22 r=%2211%22 fill=%22'+fill+'%22 stroke=%22'+stroke+'%22 stroke-width=%22'+sw+'%22 stroke-dasharray=%22'+da+'%22/><text x=%2214%22 y=%2218.5%22 text-anchor=%22middle%22 font-size=%2210%22 font-weight=%22bold%22 font-family=%22-apple-system,sans-serif%22 fill=%22'+tc+'%22>'+lbl+'</text></svg>';
      var mk=new google.maps.Marker({position:{lat:c[0],lng:c[1]},map:map,icon:{url:'data:image/svg+xml,'+svg,scaledSize:new google.maps.Size(28,28),anchor:new google.maps.Point(14,14)},title:String(c[2]).replace(/&[^;]+;/g,'')});
      var iw=new google.maps.InfoWindow({content:'<b style="font-size:.85rem;color:#1a2e1e">'+c[2]+'</b>'});
      mk.addListener('click',function(){iw.open(map,mk);});
    });
  }
  function fallbackPoly(){
    new google.maps.Polyline({path:fixPts.map(function(c){return{lat:c[0],lng:c[1]};}),strokeColor:'#7abf8a',strokeWeight:3,strokeOpacity:.85,map:map});
    var b=new google.maps.LatLngBounds();d.mc.forEach(function(c){b.extend({lat:c[0],lng:c[1]});});map.fitBounds(b,{top:24,right:24,bottom:24,left:24});
  }
  if(fixPts.length>=2){
    try{
      var ds=new google.maps.DirectionsService();
      var dr=new google.maps.DirectionsRenderer({map:map,suppressMarkers:true,preserveViewport:false,polylineOptions:{strokeColor:'#7abf8a',strokeWeight:3,strokeOpacity:.85}});
      var orig={lat:fixPts[0][0],lng:fixPts[0][1]};
      var dest={lat:fixPts[fixPts.length-1][0],lng:fixPts[fixPts.length-1][1]};
      var wpts=fixPts.slice(1,-1).map(function(c){return{location:{lat:c[0],lng:c[1]},stopover:false};});
      ds.route({origin:orig,destination:dest,waypoints:wpts,travelMode:google.maps.TravelMode.DRIVING,optimizeWaypoints:false},function(res,st){
        if(st==='OK'){
          dr.setDirections(res);
          var legs=res.routes[0].legs;
          var secs=legs.reduce(function(s,l){return s+l.duration.value;},0);
          var meters=legs.reduce(function(s,l){return s+l.distance.value;},0);
          var h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),km=Math.round(meters/1000);
          var tStr=(h>0?h+'h '+m+'min':m+' min');
          var strip=document.getElementById('map-info-'+id);
          if(strip)strip.innerHTML='&#x1F697; <b>'+tStr+'</b><span class="map-info-sub">'+km+' km Fahrtstrecke</span>';
        }else{fallbackPoly();}
        addMarkers();
      });
    }catch(e){fallbackPoly();addMarkers();}
  }else{fallbackPoly();addMarkers();}
  gmaps[id]=map;
}

// ── RENDER ──────────────────────────────────────────────────────────────
function rStop(s,n){
  var o=!!s.opt;
  var nb=o?'<div class="stop-num opt">?</div>':'<div class="stop-num fix">'+n+'</div>';
  return '<div class="stop'+(o?' is-opt':'')+'">'+nb+'<div class="stop-body"><div class="stop-name">'+s.n+(o?' <span class="badge badge-opt">&#x1F4A1; Option</span>':'')+'</div>'+(s.d?'<div class="stop-note">'+s.d+'</div>':'')+'<div class="stop-badges">'+(s.t?'<span class="badge badge-time">&#x23F0; '+s.t+'</span>':'')+(s.m?'<a href="'+s.m+'" target="_blank" class="badge badge-map">&#x1F4CD; Maps</a>':'')+'</div></div></div>';
}
function rInfo(label,color,obj){
  if(!obj)return '';
  return '<div class="card"><div class="sec-hd '+color+'">'+label+'</div><div class="info-block"><div class="info-name">'+obj.n+'</div>'+(obj.d?'<div class="info-addr">'+obj.d+'</div>':'')+(obj.a?'<div class="info-addr">'+obj.a+'</div>':'')+(obj.host?'<div class="info-addr">Kontakt: '+obj.host+'</div>':'')+'<div class="info-meta">'+(obj.t?'<span class="badge badge-time">&#x23F0; '+obj.t+'</span>':'')+(obj.r?'<span class="res-badge">&#x2705; Reserviert</span>':'')+(obj.m?'<a href="'+obj.m+'" target="_blank" class="badge badge-map">&#x1F4CD; Maps</a>':'')+(obj.p?'<a href="tel:'+obj.p+'" class="phone-link">&#x1F4DE; '+obj.p+'</a>':'')+(obj.ni?'<span class="nights-badge">&#x1F4C5; '+obj.ni+'</span>':'')+'</div></div></div>';
}
function renderDay(d){
  var fn=0;
  var stH=d.stops.map(function(s){if(!s.opt)fn++;return rStop(s,fn);}).join('');
  var routeCard='<div class="card"><div class="sec-hd sh-route">&#x1F4CD; Tagesroute</div>'+stH+'</div>';
  var specH='';
  if(d.special){specH='<div class="card special-card"><div class="sec-hd sh-special">'+d.special.ti+'</div><div class="note-item type-special">'+d.special.tx+'</div></div>';}
  var notesH='';
  if(d.notes&&d.notes.length){notesH='<div class="card note-card"><div class="sec-hd sh-note">&#x1F4A1; Hinweise</div>'+d.notes.map(function(n){return'<div class="note-item type-'+n.t+'">'+n.x+'</div>';}).join('')+'</div>';}
  var prev=d.id>0?'<button class="nav-btn" onclick="gd('+(d.id-1)+')">&#x2190; '+days[d.id-1].short+'</button>':'<button class="nav-btn" disabled>&#x2190;</button>';
  var next=d.id<days.length-1?'<button class="nav-btn" onclick="gd('+(d.id+1)+')">'+days[d.id+1].short+' &#x2192;</button>':'<button class="nav-btn" disabled>&#x2192;</button>';
  return '<div class="day" id="day-'+d.id+'"><div class="day-header"><h2>'+d.headline+'</h2><div class="day-header-date">'+d.dateStr+'</div><div class="day-header-route">'+d.route+'</div></div><div class="day-body"><div class="day-map-col"><div class="day-map-wrap"><div id="map-'+d.id+'" style="width:100%;height:100%;"></div></div><div class="map-info" id="map-info-'+d.id+'"></div></div><div class="day-content">'+routeCard+rInfo('&#x1F35C; Mittagessen','sh-lunch',d.lunch||null)+rInfo('&#x1F31C; Dinner / Abendessen','sh-dinner',d.din||null)+rInfo('&#x1F6CF; Unterkunft','sh-stay',d.stay||null)+specH+notesH+'</div></div><div class="day-nav">'+prev+next+'</div></div>';
}
function renderOv(){
  var rows=days.map(function(d){
    var tags=[];
    if(d.din&&d.din.r)tags.push('<span class="ov-tag tag-res">&#x2705; Res.</span>');
    if(d.lunch&&d.lunch.r)tags.push('<span class="ov-tag tag-res">&#x1F35C; Lunch Res.</span>');
    if(d.notes&&d.notes.some(function(n){return n.x&&(n.x.indexOf('06:30')>-1||n.x.indexOf('07:00')>-1);}))tags.push('<span class="ov-tag tag-early">&#x23F0; Fr&uuml;h</span>');
    if(d.notes&&d.notes.some(function(n){return n.x&&n.x.indexOf('CASH')>-1;}))tags.push('<span class="ov-tag tag-cash">&#x1F4B0; Cash</span>');
    if(d.stops.some(function(s){return s.opt;}))tags.push('<span class="ov-tag tag-opt">&#x1F4A1; Optionen</span>');
    if(d.special)tags.push('<span class="ov-tag tag-spec">&#x2708;&#xFE0F; Tochter</span>');
    return '<div class="ov-row" onclick="gd('+d.id+')"><div class="ov-date"><div class="ov-d">'+d.short+'</div><div class="ov-m">'+d.dayLabel+'</div></div><div class="ov-content"><div class="ov-title">'+d.headline+'</div><div class="ov-sub">'+d.route.replace(/&[a-z]+;/g,'').substring(0,50)+'</div>'+(tags.length?'<div class="ov-tags">'+tags.join('')+'</div>':'')+'</div></div>';
  }).join('');
  return '<div class="day active" id="day-ov"><div class="card"><div class="sec-hd sh-route">&#x1F4CB; Reise&uuml;bersicht &#x2013; 11 Tage</div><div style="padding:12px 14px;">'+rows+'</div></div></div>';
}
var tabData=[{id:'ov',l:'&#x25C9; Alle',s:'&Uuml;bersicht'}].concat(days.map(function(d){return{id:'d'+d.id,l:d.short,s:d.dayLabel};}));
document.getElementById('tabNav').innerHTML=tabData.map(function(t,i){return'<div class="tab'+(i===0?' active':'')+'" id="tab-'+t.id+'" onclick="gt(\x27'+t.id+'\x27)" ><div class="tab-date">'+t.l+'</div><div class="tab-label">'+t.s+'</div></div>';}).join('');
document.getElementById('root').innerHTML=renderOv()+days.map(renderDay).join('');
var cur=0;
function ha(){document.querySelectorAll('.day,.tab').forEach(function(e){e.classList.remove('active');});}
function gt(id){ha();var cid=id==='ov'?'day-ov':'day-'+id.replace('d','');document.getElementById(cid).classList.add('active');document.getElementById('tab-'+id).classList.add('active');document.getElementById('tab-'+id).scrollIntoView({inline:'center',behavior:'smooth'});if(id!=='ov'){var idx=parseInt(id.replace('d',''));cur=idx;up();setTimeout(function(){initMap(idx);},150);}window.scrollTo({top:0,behavior:'smooth'});}
function gd(idx){ha();document.getElementById('day-'+idx).classList.add('active');document.getElementById('tab-d'+idx).classList.add('active');document.getElementById('tab-d'+idx).scrollIntoView({inline:'center',behavior:'smooth'});cur=idx;up();setTimeout(function(){initMap(idx);},150);window.scrollTo({top:0,behavior:'smooth'});}
function up(){document.getElementById('prog').style.width=((cur/(days.length-1))*100)+'%';}
if(localStorage.getItem('sc26')==='1'){setTimeout(function(){initMap(0);},500);}
</script>
